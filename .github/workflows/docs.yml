name: Docs

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  sphinx:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + docs deps
        # Sphinx tooling lives under [dev] per the 3-tier dependency
        # policy (scitex/general/05_development_11_dependency-tiers.md);
        # the old fragmented [docs] extra has been removed.
        run: pip install -e ".[dev]"

      - name: Build Sphinx HTML (warnings fail PRs only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sphinx-build -W -b html docs/sphinx docs/sphinx/_build/html
          else
            sphinx-build -b html docs/sphinx docs/sphinx/_build/html
          fi

      - name: Refresh src/scitex_datetime/_sphinx_html/ (push to default branch only)
        if: github.event_name == 'push'
        run: |
          rm -rf src/scitex_datetime/_sphinx_html
          cp -rf docs/sphinx/_build/html src/scitex_datetime/_sphinx_html
          touch src/scitex_datetime/_sphinx_html/.nojekyll

      - name: Commit refreshed HTML if it changed
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain src/scitex_datetime/_sphinx_html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/scitex_datetime/_sphinx_html
            git commit -m "docs: refresh _sphinx_html/ from CI build [skip ci]"
            git push
          fi
