name: docs

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  sphinx:
    # Skip when HEAD is the bot's own previous docs auto-commit — breaks
    # the infinite loop without using `[skip ci]`, which would also
    # suppress the tag-push and release workflows when the auto-commit
    # is the most recent commit on develop at release time.
    if: "!contains(github.event.head_commit.message, 'docs(sphinx_html): refresh from CI build')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + docs deps
        # `[docs]` is intentionally not defined — per
        # `general/05_development_11` doc-tooling lives in `[dev]` (the
        # maintainer extra), not its own fragmented extra. See
        # pyproject.toml for the doc deps (sphinx, myst-parser, ...).
        run: pip install -e ".[dev]"

      - name: Build Sphinx HTML (warnings fail PRs only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sphinx-build -W -b html docs/sphinx docs/sphinx/_build/html
          else
            sphinx-build -b html docs/sphinx docs/sphinx/_build/html
          fi

      - name: Refresh src/scitex_datetime/_sphinx_html/ (develop push only)
        # main is PR-only — its _sphinx_html/ bundle arrives via the
        # develop -> main PR. Direct bot-pushes to main are inhibited
        # so the branch history stays linear-via-PR.
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          rm -rf src/scitex_datetime/_sphinx_html
          cp -rf docs/sphinx/_build/html src/scitex_datetime/_sphinx_html
          touch src/scitex_datetime/_sphinx_html/.nojekyll

      - name: Commit refreshed HTML if it changed (develop push only)
        # Non-blocking. `develop` is a protected branch that requires N
        # status checks on incoming commits; a bot push from the workflow
        # has no checks attached and is rejected with `GH006: Protected
        # branch update failed`. The vendored `_sphinx_html/` refresh is a
        # nice-to-have for the next release wheel, not a correctness gate
        # — let the docs job stay green when the push is rejected, and
        # let the release pipeline regenerate `_sphinx_html/` on its own
        # branch where the push succeeds.
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        continue-on-error: true
        run: |
          if [ -n "$(git status --porcelain src/scitex_datetime/_sphinx_html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/scitex_datetime/_sphinx_html
            git commit -m "docs(sphinx_html): refresh from CI build"
            git push || echo "::warning::push to protected develop rejected (expected under GH006); skipping vendored _sphinx_html refresh on this run"
          fi
